    // ===== GLOBALS =====
    let canvas, ctx;
    let head;
    let fruit;
    let walls;
    let openPositions;
    let controlsRegistered = false;
    let gameOver = false;

    // ===== CLASS =====
    class Head {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 20;
            this.color = "blue";

            this.speed = 20;
            this.dx = this.speed;
            this.dy = 0;
        }

        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    class Fruit {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 20;
            this.color = "red";
        }
        draw(ctx) {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
    function startGame() {
        canvas = document.getElementById("gameCanvas");
        ctx = canvas.getContext("2d");
        let selectedMap = maplist[Math.floor(Math.random() * maplist.length)];
        
        // Find open positions for fruit
        openPositions = [];
        for (let i = 0; i < selectedMap.length; i++) {
            for (let j = 0; j < selectedMap[i].length; j++) {
                if (selectedMap[i][j] === 0) {
                    openPositions.push({x: j * 20, y: i * 20});
                }
            }
        }
        
        // Choose random fruit from open positions, not start
        let validFruits = openPositions.filter(pos => !(pos.x === 20 && pos.y === 0));
        let fruitPos = validFruits[Math.floor(Math.random() * validFruits.length)];
        
        walls = [];
        for (let i = 0; i < selectedMap.length; i++) {
            for (let j = 0; j < selectedMap[i].length; j++) {
                if (selectedMap[i][j] === 1) {
                    walls.push({ x: j * 20, y: i * 20, size: 20 });
                }
            }
        }
        gameOver = false;
        head = new Head(20, 0);
        fruit = new Fruit(fruitPos.x, fruitPos.y);

        if (!controlsRegistered) {
            document.addEventListener("keydown", handleKeys);
            controlsRegistered = true;
        }
        draw();
    }

    function generateWalls(map) {
        let walls = [];
        for (let i = 0; i < map.length; i++) {
            for (let j = 0; j < map[i].length; j++) {
                if (map[i][j] === 1) {
                    walls.push({ x: j * 20, y: i * 20, size: 20 });
                }
            }
        }
        return walls;
    }

    function moveOneStep(dx, dy) {
        let newX = head.x + dx;
        let newY = head.y + dy;
        if (newX < 0 || newY < 0 || newX + head.size > canvas.width || newY + head.size > canvas.height) {
            return;
        }
        for (let wall of walls) {
            if (newX < wall.x + wall.size && newX + head.size > wall.x &&
                newY < wall.y + wall.size && newY + head.size > wall.y) {
                return;
            }
        }
        head.x = newX;
        head.y = newY;
        checkFruitCollision();
        draw();
    }


        function isColliding(aX, aY, aSize, bX, bY, bSize) {
        return (
          aX < bX + bSize &&
          aX + aSize > bX &&
          aY < bY + bSize &&
          aY + aSize > bY
        );
        }

    function checkFruitCollision() {
        const hitX = head.x < fruit.x + fruit.size && head.x + head.size > fruit.x;
        const hitY = head.y < fruit.y + fruit.size && head.y + head.size > fruit.y;

        if (hitX && hitY) {
            respawnFruit(); // Respawn fruit
        }
    }

    function respawnFruit() {
        let validPositions = openPositions.filter(pos => !(pos.x === head.x && pos.y === head.y));
        let fruitPos = validPositions[Math.floor(Math.random() * validPositions.length)];
        fruit.x = fruitPos.x;
        fruit.y = fruitPos.y;
    }

    // ===== DRAW =====
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (fruit) fruit.draw(ctx);
        for (let i = 0; i < walls.length; i++) {
            ctx.fillStyle = "gray";
            ctx.fillRect(walls[i].x, walls[i].y, walls[i].size, walls[i].size);
        }
        head.draw(ctx);

        if (gameOver) {
            ctx.fillStyle = "white";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
        }
    }

    // ===== CONTROLS =====
    function handleKeys(e) {
        if (gameOver) return;
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
            e.preventDefault();
        }

        if (e.key === "ArrowUp") {
            moveOneStep(0, -20);
        }

        if (e.key === "ArrowDown") {
            moveOneStep(0, 20);
        }

        if (e.key === "ArrowLeft") {
            moveOneStep(-20, 0);
        }

        if (e.key === "ArrowRight") {
            moveOneStep(20, 0);
        }
    }
